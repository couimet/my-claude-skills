name: Stamp Skills

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Stamp SKILL.md files
        run: scripts/stamp-skills.sh

      - name: Commit stamped files (if changed)
        run: |
          if git diff --quiet skills/; then
            echo "All skills already at current version, nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add skills/
            VERSION=$(grep -m1 '^## [0-9]' CHANGELOG.md | sed 's/^## //')@$(git rev-parse --short HEAD)
            git commit -m "chore: stamp skills with version ${VERSION} [skip ci]"
            git push --force-with-lease
          fi
