name: Stamp Skills

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Derive version
        id: version
        run: |
          CALVER=$(grep -m1 '^## [0-9]' CHANGELOG.md | sed 's/^## //')
          SHA=$(git rev-parse --short HEAD)
          echo "value=${CALVER}@${SHA}" >> "$GITHUB_OUTPUT"

      - name: Stamp SKILL.md files
        run: scripts/stamp-skills.sh "${{ steps.version.outputs.value }}"

      - name: Commit stamped files (if changed)
        run: |
          if git diff --quiet skills/; then
            echo "All skills already at version ${{ steps.version.outputs.value }}, nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add skills/
            git commit -m "chore: stamp skills with version ${{ steps.version.outputs.value }} [skip ci]"
            git push
          fi
